# Local Postgres for Insurance CRM (matches backend/.env default user + DB name).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: yashbankar
      POSTGRES_DB: insurance_crm
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yashbankar -d insurance_crm"]
      interval: 3s
      timeout: 5s
      retries: 20
    volumes:
      - insurance_crm_pg:/var/lib/postgresql/data

volumes:
  insurance_crm_pg:
